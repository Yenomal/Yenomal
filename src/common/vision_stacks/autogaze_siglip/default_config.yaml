# Default reusable visual stack built from AutoGaze + SigLIP + a projection adapter.
stack:  # Core stack settings shared across baselines.
  name: autogaze_siglip  # Stable stack identifier used by project configs or registries.
  autogaze_repo_root: third_party/AutoGaze  # Keep using the current third_party checkout instead of copying code.
  autogaze_model_path: nvidia/AutoGaze  # Hugging Face repo or local checkpoint for the gaze generator.
  siglip_model_path: google/siglip2-base-patch16-224  # Vision backbone used after gaze selection.
  history_len: 8  # Number of history frames expected by the stack.
  gazing_ratio: 0.10  # Fraction of patches kept by AutoGaze for each history frame.
  task_loss_requirement: null  # Optional AutoGaze threshold; null means disabled.
  current_view_names: [head, left, right]  # Ordered current-time camera views passed to the stack.
  input_mean: [0.485, 0.456, 0.406]  # Mean used by the upstream image pipeline before this stack re-normalizes pixels.
  input_std: [0.229, 0.224, 0.225]  # Std used by the upstream image pipeline before this stack re-normalizes pixels.
  attn_implementation: sdpa  # SigLIP attention backend; keep aligned with the current AutoGaze integration.

adapter:  # Thin reusable adapter that maps raw SigLIP features to consumer-ready tokens.
  output_dim: 960  # Final token width expected by the downstream baseline.
  projector_hidden_dim: 1536  # Hidden width of the MLP projector.
  add_source_embeddings: true  # Add embeddings that distinguish history/head/left/right token groups.
  add_age_embeddings: true  # Add temporal age embeddings to history tokens.
